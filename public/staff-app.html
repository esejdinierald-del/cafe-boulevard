<!doctype html>
<html lang="sq">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="manifest" href="/staff-manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a10" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Boulevard Staff" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <title>Boulevard Staff</title>
    <style>
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #0a0a10; color: #f5f5f7;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex; align-items: center; justify-content: center;
      }
      .wrap { text-align: center; }
      .msg { opacity: 0.75; font-size: 15px; letter-spacing: 0.02em; margin-bottom: 24px; }
      .btn {
        display: inline-block;
        padding: 14px 32px;
        border-radius: 12px;
        background: #f5f5f7;
        color: #0a0a10;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-decoration: none;
        border: none;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .btn:active { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="msg">Instaloje këtë faqe si aplikacion stafi, pastaj shtyp butonin.</div>
      <button class="btn" onclick="try { localStorage.setItem('staff_pwa_preferred', '1'); } catch (e) {} window.location.href = '/staff?app=ios';">Hyr te Stafi</button>
    </div>
  </body>
</html>
